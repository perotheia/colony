# stage-release.yml — lay the two-plane OTA runtime layout WITHOUT relocating any
# binaries. The RUNTIME release is an ANCHORED SYMLINK back to $THEIA_ROOT:
#
#   /opt/theia/{bin,config,lib}                the flat deb layout — NOT moved
#   /opt/theia/releases/runtime-<ver> -> ..    (anchored: points at /opt/theia)
#   /opt/theia/current -> releases/runtime-<ver>
#
# So current/{bin,config,lib} resolve to the flat runtime dirs (the STOCK launcher
# reads current/config/executor.json = the flat runtime config), and an SWP flip
# moves `current` to a REAL release dir (releases/<swp>-<ver>) with its own config.
#
# Why anchored (not current -> .): `current` points at a NAMED release symlink, so
# `previous`/rollback save a real name (not `.`) and release_version reads
# runtime-<ver>. (`find -L current` reports a benign, DETECTED-and-skipped loop —
# the runtime-<ver> -> .. self-reference; GNU find/cp/rsync/tar handle it, no hang.
# The OTA path resolves child bins via readlink -f, which is loop-clean.)
#
# Vars: release_version — the pinned runtime_version (S3) or 'local'. A DISTINCT
# name so the caller derives it without a self-referential template.
- name: "Resolve the release version"
  ansible.builtin.set_fact:
    _relver: "runtime-{{ release_version | default(runtime_version | default('local', true), true) }}"

- name: "Ensure the releases/ dir"
  ansible.builtin.file:
    path: "{{ theia_root }}/releases"
    state: directory
    mode: "0755"

# releases/runtime-<ver> -> .. (anchored: the symlink lives in releases/, so '..'
# is $THEIA_ROOT). Absolute target avoids any ambiguity.
- name: "Anchor releases/{{ _relver }} -> {{ theia_root }} (the runtime IS the flat tree)"
  ansible.builtin.file:
    src: "{{ theia_root }}"
    dest: "{{ theia_root }}/releases/{{ _relver }}"
    state: link
    force: true

- name: "Point current -> releases/{{ _relver }}"
  ansible.builtin.file:
    src: "releases/{{ _relver }}"
    dest: "{{ theia_root }}/current"
    state: link
    force: true
  notify: "reload supervisor"
