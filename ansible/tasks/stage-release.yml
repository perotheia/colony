# stage-release.yml — lay the OTA-CORRECT release-dir layout the strict (G1)
# supervisor requires, from the flat-installed runtime/services .debs.
#
#   /opt/theia/bin/supervisor        the UPDATER (runtime deb) — fixed, NEVER swapped
#   /opt/theia/releases/<ver>/bin/   the SERVICES + APPS (the OTA-swappable set)
#   /opt/theia/releases/<ver>/lib/   release libs (empty today — services static-
#                                    link / use system .so's; here for OTA parity)
#   /opt/theia/current -> releases/<ver>   the symlink the supervisor forks children from
#
# theia-run.sh + the supervisor REFUSE to start without `current` (no flat-bin
# fallback), and a Mender/UCM OTA flips current -> releases/<new> + restarts the
# FCs. The .debs install flat to /opt/theia/bin; this task RELOCATES the child
# binaries (everything except the supervisor) into releases/<ver>/bin and points
# current at it. Idempotent: re-running re-syncs the release dir + re-flips current.
#
# Vars:
#   release_version  the <ver> for the release dir. The orchestrate play passes the
#                    pinned runtime_version (S3 path) or 'local' (local-bundle path).
#                    A DISTINCT name from runtime_version so the caller can derive it
#                    without a self-referential (recursive) template. Falls back to
#                    runtime_version then 'local' for direct callers.
- name: "Resolve the release version"
  ansible.builtin.set_fact:
    # two-plane OTA (docs/design/two-plane-ota.md): the RUNTIME is itself a release
    # dir (releases/runtime-<ver>), so current always points INTO releases/ — never
    # at `.` (which self-loops on -L walks + breaks previous/rollback). SWP flips
    # then move current between real release dirs.
    _relver: "runtime-{{ release_version | default(runtime_version | default('local', true), true) }}"

- name: "Release dir for {{ _relver }}"
  ansible.builtin.file:
    path: "{{ theia_root }}/releases/{{ _relver }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - bin
    - lib
    - config

- name: "Enumerate the child binaries flat-installed by the services .deb"
  # Everything in bin/ EXCEPT the supervisor (the updater stays flat). The
  # services .deb owns exactly the FC binaries; the runtime .deb owns supervisor.
  ansible.builtin.find:
    paths: "{{ theia_root }}/bin"
    file_type: file
    excludes: "supervisor,theia-run"
  register: _children

- name: "Relocate the child binaries into releases/{{ _relver }}/bin"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ theia_root }}/releases/{{ _relver }}/bin/{{ item.path | basename }}"
    mode: "0755"
    remote_src: true
  loop: "{{ _children.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: "Point current -> releases/{{ _relver }} (the OTA release symlink)"
  ansible.builtin.file:
    src: "releases/{{ _relver }}"
    dest: "{{ theia_root }}/current"
    state: link
    force: true
  notify: "reload supervisor"

- name: "Drop the now-redundant flat child binaries (supervisor reads current/bin)"
  # Keep bin/supervisor (the updater); the FC copies now live under current/bin,
  # so the flat duplicates only waste space and could drift. Idempotent.
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _children.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
