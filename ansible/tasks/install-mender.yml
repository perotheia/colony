# install-mender.yml — install the Mender client (the ONE persistent agent on the
# rig; OTA only) + the theia-release custom update module + the Mender→UCM state
# script. == the new agentless analogue of "provisioning installs the convergence
# agent" — except Mender does OTA, NOT general config (that's controller-pushed).
#
# Theia does NOT use Mender's rootfs A/B; the theia-release module lands releases
# as /opt/theia/releases/<ver> + a `current` symlink switch (see deploy/mender/).

# Add the Mender apt repo FIRST. We install the 4.x client (mender-update +
# mender-auth), NOT the legacy mender-client: the server v4.0.1 deployments API
# (server-enrolled OTA) needs the 4.x update/auth split, and `mender-update install`
# is what UCM's standalone path drives. The old mender-client (2.x/3.x) both fails
# on modern artifacts AND *conflicts* with mender-auth at the dpkg level, so it must
# be removed before the 4.x stack installs cleanly.
- name: "Trust the Mender apt signing key"
  ansible.builtin.get_url:
    url: https://downloads.mender.io/repos/debian/gpg
    dest: /etc/apt/trusted.gpg.d/mender.asc
    mode: "0644"
  become: true
  failed_when: false   # offline rig → fall back to the distro package below

- name: "Add the Mender apt repo ({{ ansible_distribution | lower }}/{{ ansible_distribution_release }})"
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ deb_arch | default('arm64') }}] https://downloads.mender.io/repos/debian {{ ansible_distribution | lower }}/{{ ansible_distribution_release }}/stable main"
    filename: mender
    state: present
    update_cache: true
  become: true
  failed_when: false

# Retire the legacy mender-client: it conflicts with mender-auth (dpkg "conflicts
# with mender-client"), so leaving it installed makes the 4.x install fail. Purge
# is idempotent (a no-op when absent).
- name: "Remove the legacy mender-client (conflicts with mender-auth 4.x)"
  ansible.builtin.apt:
    name: mender-client
    state: absent
    purge: true
  become: true
  failed_when: false

- name: "Install the 4.x Mender client (mender-update + mender-auth)"
  ansible.builtin.apt:
    name:
      - mender-update
      - mender-auth
    state: present
    update_cache: true
  failed_when: false          # offline rig (no repo reach) — tolerate; enroll-rig.sh seeds the debs
  register: _mender_apt

- name: "Ensure the Mender state dirs"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/mender
    - /etc/mender

- name: "Seed the Mender device identity (device_type + artifact_info)"
  # mender install gates on /var/lib/mender/device_type matching the artifact's
  # compatible-devices, and reads /etc/mender/artifact_info for the current
  # artifact name. On a server-enrolled rig these come from enrolment; for
  # standalone OTA we seed them so `mender install` works out of the box. The
  # device_type is registry-driven (mender_device_type) so a gateway rig enrols
  # as theia-gateway, not the hardcoded theia-rig.
  ansible.builtin.copy:
    dest: "{{ item.path }}"
    content: "{{ item.content }}\n"
    mode: "0644"
  loop:
    - { path: /var/lib/mender/device_type, content: "device_type={{ mender_device_type | default('theia-rig') }}" }
    - { path: /etc/mender/artifact_info, content: "artifact_name=unprovisioned" }
  loop_control:
    label: "{{ item.path }}"

# The theia update modules (theia-swp/theia-app/theia-release) + the Mender→UCM
# state scripts are on-device OTA assets colony installs at PROVISION time (the
# 2-step model: provision = one-time board setup incl. the update modules;
# orchestrate = per-deploy runtime install). They travel WITH the S3 runtime
# manifest (theia release --s3 packs platform/runtime/ota/ into manifest.tar.gz →
# fetch-manifest-s3.yml unpacks it and sets mender_artifacts_dir=<cache>/ota).
# S3-EXCLUSIVE: this is REQUIRED, not optional — without the modules the Mender
# client can't run a theia-swp/theia-release artifact (deploys hang pending).
# The OTA update modules (theia-release/theia-app/theia-swp) install via the
# SHARED task, so provision + orchestrate stay in lockstep (orchestrate re-installs
# them too, so an updated module reaches a deployed board — see install-ota-modules.yml).
- name: "Install the theia Mender update modules (shared task)"
  ansible.builtin.include_tasks: install-ota-modules.yml

- name: "Ensure the Mender scripts dir"
  ansible.builtin.file:
    path: /etc/mender/scripts
    state: directory
    mode: "0755"

- name: "Install the Mender→UCM state script + the UCM adopter from the S3 OTA assets"
  ansible.builtin.copy:
    src: "{{ mender_artifacts_dir }}/state-scripts/{{ item }}"
    dest: "/etc/mender/scripts/{{ item }}"
    mode: "0755"
  loop:
    - ArtifactInstall_Leave_01_ucm-request   # the Mender hook
    - ucm-adopt.py                            # hands the landed release to UCM

# Tailscale/VPN enrolment is its OWN flow (tools/rig-enroll over com gRPC) — not
# here. This task only lands the OTA agent + the theia-release customization.

# ── SWP artifact-verify key (app-plane authenticity) ─────────────────────────
# Pull the PUBLIC verify key from the S3 provisioning plane and point mender.conf
# at it, so mender-update REFUSES any SWP not signed by the operator's private
# key (`theia release-swp` signs; `theia cert copy` uploaded this public half).
# Fail-CLOSED: with the key present, unsigned/forged artifacts are rejected
# UPSTREAM of the theia-swp module. The key is NEVER baked into the image or
# committed — the operator regenerates the pair per deployment (`theia cert
# generate`). NO-OP without an S3 endpoint (a local/dev provision).
- name: "SWP verify key: S3 provisioning plane configured?"
  ansible.builtin.set_fact:
    _swp_verify_key: "{{ (s3_endpoint | default('') | length) > 0 }}"

# PER-DEVICE key first (the opt-in override the GS pins via the Fleet UI and
# mirrors to provisioning/by-name/<name>.pem), then the FLEET key. `target` is the
# device/machine name colony provisions (== the GS device name). A 404 on the
# per-device key is expected (most rigs use the fleet key) — status_code tolerates
# it so we fall through.
- name: "SWP verify key: try this rig's PER-DEVICE key (by name)"
  ansible.builtin.get_url:
    url: "{{ s3_endpoint }}/{{ s3_runtime_bucket | default('theia-runtime') }}/provisioning/by-name/{{ target }}.pem"
    dest: /etc/mender/artifact-verify-key.pem
    mode: "0644"
    force: true
  register: _per_device_key
  failed_when: false        # 404 = no per-device override; fall back below
  when: _swp_verify_key | bool

- name: "SWP verify key: fall back to the FLEET key when no per-device key"
  ansible.builtin.get_url:
    url: "{{ s3_endpoint }}/{{ s3_runtime_bucket | default('theia-runtime') }}/provisioning/artifact-verify-key.pem"
    dest: /etc/mender/artifact-verify-key.pem
    mode: "0644"
    force: true            # always refresh — a rotated key must land
  when:
    - _swp_verify_key | bool
    - (_per_device_key.status_code | default(0)) != 200

- name: "SWP verify key: which key landed?"
  ansible.builtin.debug:
    msg: >-
      {{ 'PER-DEVICE verify key (by-name/' ~ target ~ '.pem)'
         if (_per_device_key.status_code | default(0)) == 200
         else 'FLEET verify key (provisioning/artifact-verify-key.pem)' }}
  when: _swp_verify_key | bool

# mender.conf is written LATER by enroll-rig.sh (it `cat >`s the whole file, so
# it carries ArtifactVerifyKey itself — see ground-station/mender/server/
# enroll-rig.sh). At provision time the file may not exist yet, so only patch it
# when present (a rig whose conf is baked/pre-written); never CREATE a partial
# conf here. The key file above is what matters; the setting rides in via
# enroll-rig or a baked image conf.
- name: "SWP verify key: mender.conf present?"
  ansible.builtin.stat:
    path: /etc/mender/mender.conf
  register: _mender_conf
  when: _swp_verify_key | bool

- name: "SWP verify key: ensure mender.conf sets ArtifactVerifyKey (if conf exists)"
  ansible.builtin.lineinfile:
    path: /etc/mender/mender.conf
    regexp: '"ArtifactVerifyKey"'
    line: '  "ArtifactVerifyKey": "/etc/mender/artifact-verify-key.pem",'
    insertafter: '"ServerURL"'
  when:
    - _swp_verify_key | bool
    - _mender_conf.stat.exists | default(false)

- name: "SWP verify key: report"
  ansible.builtin.debug:
    msg: >-
      {{ 'ArtifactVerifyKey installed — this rig REFUSES unsigned/forged SWPs'
         if _swp_verify_key | bool
         else 'no S3 endpoint — verify key NOT installed (dev provision)' }}
