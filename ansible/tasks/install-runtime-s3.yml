# install-runtime-s3.yml — install Theia RUNTIME + SERVICES on the rig by pulling
# the .debs from the MinIO runtime plane (s3://theia-runtime/<ver>/). The factory
# runtime install: the rig is provisioned with the version PINNED by runtime_version
# (official tag OR dev rc like 0.2.1-rc1), so the field loop tests non-official
# builds without a GitHub release. The theia-runtime bucket is anonymously
# readable, so the rig pulls over plain HTTP (get_url) — NO aws cli on the device.
#
# AUTHORITATIVE OBJECT LIST = <ver>/index.json. The seeder (ground-station
# seed-official.sh) names the debs by their dpkg-native filename
# (theia-runtime_<ver>_<arch>.deb) and records the exact keys + sha256 in
# index.json. We read it on the rig and pull exactly what it lists — so this task
# never has to reconstruct the filename (version-in-name vs not, etc.) and the
# sha256 is verified end-to-end.
#
# Vars (registry / -e):
#   runtime_version   the <ver> under theia-runtime/<ver>/  (e.g. 0.2.0)
#   s3_endpoint       MinIO URL reachable from the rig (e.g. http://10.0.0.99:9000)
#   s3_runtime_bucket default "theia-runtime"
- name: "Ensure /opt/theia/ipk exists"
  ansible.builtin.file:
    path: "{{ theia_root }}/ipk"
    state: directory
    mode: "0755"

- name: "Fetch the runtime plane index ({{ s3_runtime_bucket | default('theia-runtime') }}/{{ runtime_version }}/index.json)"
  ansible.builtin.uri:
    url: "{{ s3_endpoint }}/{{ s3_runtime_bucket | default('theia-runtime') }}/{{ runtime_version }}/index.json"
    return_content: true
  register: _runtime_index

- name: "Resolve the deb object list from the index"
  ansible.builtin.set_fact:
    _runtime_debs: "{{ (_runtime_index.content | from_json).debs }}"

- name: "Fetch runtime + services .debs from S3 (sha256-checked)"
  ansible.builtin.get_url:
    url: "{{ s3_endpoint }}/{{ s3_runtime_bucket | default('theia-runtime') }}/{{ item.file }}"
    dest: "{{ theia_root }}/ipk/{{ item.file | basename }}"
    checksum: "sha256:{{ item.sha256 }}"
    mode: "0644"
  loop: "{{ _runtime_debs }}"
  loop_control:
    label: "{{ item.file | basename }}"

- name: "Dpkg --install runtime + services (--force-overwrite)"
  ansible.builtin.command:
    cmd: "dpkg --install --force-overwrite {{ _runtime_debs | map(attribute='file') | map('basename') | map('regex_replace', '^', theia_root + '/ipk/') | join(' ') }}"
  environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: _dpkg
  changed_when: _dpkg.rc == 0
