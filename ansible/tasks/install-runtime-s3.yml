# install-runtime-s3.yml — install Theia RUNTIME + SERVICES on the rig by pulling
# the .debs from the MinIO runtime plane (s3://theia-runtime/<ver>/). The factory
# runtime install: the rig is provisioned with the version PINNED by runtime_version
# (official tag OR dev rc like 0.2.1-rc1), so the field loop tests non-official
# builds without a GitHub release. The theia-runtime bucket is anonymously
# readable, so the rig pulls over plain HTTP (get_url) — NO aws cli on the device.
#
# Vars (registry / -e):
#   runtime_version   the <ver> under theia-runtime/<ver>/  (e.g. 0.2.0)
#   s3_endpoint       MinIO URL reachable from the rig (e.g. http://10.0.0.99:9000)
#   s3_runtime_bucket default "theia-runtime"
#   deb_arch          default "amd64"
- name: "Ensure /opt/theia/ipk exists"
  ansible.builtin.file:
    path: "{{ theia_root }}/ipk"
    state: directory
    mode: "0755"

- name: "Fetch runtime + services .debs from S3 ({{ s3_runtime_bucket | default('theia-runtime') }}/{{ runtime_version }})"
  ansible.builtin.get_url:
    url: "{{ s3_endpoint }}/{{ s3_runtime_bucket | default('theia-runtime') }}/{{ runtime_version }}/{{ item }}"
    dest: "{{ theia_root }}/ipk/{{ item }}"
    mode: "0644"
  loop:
    - "theia-runtime_{{ deb_arch | default('amd64') }}.deb"
    - "theia-services_{{ deb_arch | default('amd64') }}.deb"

- name: "Dpkg --install runtime + services (--force-overwrite)"
  ansible.builtin.command:
    cmd: "dpkg --install --force-overwrite {{ theia_root }}/ipk/theia-runtime_{{ deb_arch | default('amd64') }}.deb {{ theia_root }}/ipk/theia-services_{{ deb_arch | default('amd64') }}.deb"
  environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  register: _dpkg
  changed_when: _dpkg.rc == 0
