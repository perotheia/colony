# seed-config.yml — write the REAL executor.json (replaces the empty tree Phase 1
# seeded) + the per-FC static config profiles. == orchestration.pp steps 3 + 3b.
#
# `theia manifest` already extracted execution.json.supervisor_tree into a ready
# executor.json per host AND emitted <machine>/config/<fc>.json (the gen-params
# MACHINE-GENERIC default — NO override baked in). We just COPY them; the override
# layers (deploy/config/<machine>/ then deploy/config/<target>/) are merged ON TOP
# at deploy time by config-override.yml — that's what lands the tsync
# GM-on-central / slave-on-compute split + the per-rig (rpi4 RTK) tweaks.
- name: "Copy the REAL executor.json (→ notify supervisor reload)"
  ansible.builtin.copy:
    src: "{{ executor_src }}"
    dest: "{{ theia_root }}/config/executor.json"
    mode: "0644"
  notify: "reload supervisor"

# machines.json → config/ so com reads the AUTHORITATIVE instance→machine_index→
# name map (theia-run.sh sets THEIA_MACHINE_MANIFEST=config when this is present).
# The unique machine NAME is the runtime identity com/GUI key on. Top-level file
# (manifest_dir/machines.json), not per-machine. Tolerate its absence (older
# manifests / a single-machine slice) — com falls back to supervisor-reported name.
- name: "Copy machines.json → config/ (com's machine_index reference)"
  ansible.builtin.copy:
    src: "{{ manifest_dir }}/machines.json"
    dest: "{{ theia_root }}/config/machines.json"
    mode: "0644"
  failed_when: false

- name: "Find the per-FC config profiles on the controller"
  ansible.builtin.find:
    paths: "{{ config_src_dir }}"
    patterns: "*.json"
  delegate_to: localhost
  become: false
  register: _fc_configs
  failed_when: false           # older manifests have no config/ dir — tolerate

- name: "Copy the per-FC config profiles → /opt/theia/config/"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ theia_root }}/config/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ _fc_configs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
