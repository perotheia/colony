# etcd.yml — install + configure etcd ONLY on the etcd_machine, and only when
# etcd isn't externally provided (docker compose etcd service / the host's etcd).
# ONE per cluster (== provisioning.pp step 2).
#
# etcd_external is set per-run (-e etcd_external=true) or via a host var; default
# unset → install on the etcd host.
#
# L4-B SHARED ETCD: the central board runs THE one etcd for the whole robot; the
# compute boards' `per` point their etcd_endpoint at it (the registry's
# etcd_endpoint config-override). So etcd must listen on a REACHABLE address, not
# just localhost. `etcd_listen_host` (default 0.0.0.0) + `etcd_advertise_host`
# (default the rig's ansible_host) drive the listen/advertise URLs.
- name: "Etcd-server (cluster singleton)"
  ansible.builtin.apt:
    name: etcd-server
    state: present
    update_cache: true
  when:
    - machine == etcd_machine
    - not (etcd_external | default(false) | bool)

# /etc/default/etcd — the listen/advertise URLs + ETCD_UNSUPPORTED_ARCH for arm64
# boards (focal's etcd 3.2 REFUSES to start on aarch64 without it). Templated so a
# compute board reaches the central's etcd over eth.
- name: "Configure etcd listen/advertise + arm64 flag (/etc/default/etcd)"
  ansible.builtin.copy:
    dest: /etc/default/etcd
    mode: "0644"
    content: |
      # Managed by colony etcd.yml — L4-B shared-etcd config.
      ETCD_LISTEN_CLIENT_URLS=http://{{ etcd_listen_host | default('0.0.0.0') }}:2379
      ETCD_ADVERTISE_CLIENT_URLS=http://{{ etcd_advertise_host | default(ansible_host) }}:2379
      {% if ansible_architecture == 'aarch64' %}
      ETCD_UNSUPPORTED_ARCH=arm64
      {% endif %}
  register: _etcd_cfg
  when:
    - machine == etcd_machine
    - not (etcd_external | default(false) | bool)

- name: "Restart etcd on config change (systemd hosts)"
  ansible.builtin.systemd:
    name: etcd
    state: restarted
    enabled: true
    daemon_reload: true
  when:
    - machine == etcd_machine
    - not (etcd_external | default(false) | bool)
    - ansible_service_mgr == "systemd"

- name: "Start etcd directly (NO systemd — container rig)"
  # A systemd-less rig (container) can't use the unit; launch etcd in the
  # background with the env from /etc/default/etcd (the listen/advertise URLs).
  # Idempotent: kill a prior one (skip self) then setsid-detach a fresh one.
  ansible.builtin.copy:
    dest: /usr/local/bin/etcd-start.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set +e
      pkill -x etcd 2>/dev/null
      sleep 1
      set -a; . /etc/default/etcd 2>/dev/null; set +a
      install -d -m0755 "${ETCD_DATA_DIR:-/var/lib/etcd}"
      setsid etcd >/var/log/etcd.log 2>&1 < /dev/null &
      sleep 2
      pgrep -x etcd >/dev/null
  when:
    - machine == etcd_machine
    - not (etcd_external | default(false) | bool)
    - ansible_service_mgr != "systemd"

- name: "Launch etcd via the start script (container rig)"
  ansible.builtin.command: /usr/local/bin/etcd-start.sh
  when:
    - machine == etcd_machine
    - not (etcd_external | default(false) | bool)
    - ansible_service_mgr != "systemd"
  changed_when: true
