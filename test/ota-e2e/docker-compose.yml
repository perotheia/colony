# docker-compose.yml — OTA end-to-end test (provision → enroll → install → update
# → rollback), CI-runnable, on a BRIDGE network (the real-board model).
#
# BRIDGE networking (not host): each board container has its OWN network namespace
# and therefore its OWN TIPC namespace — exactly like two physical boards (rpi4 +
# jetson). The cross-board link is a real TIPC eth bearer
# (`tipc bearer enable media eth device eth0`) over the bridge L2, brought up on
# BOTH ends by colony's tipc-bearer.yml (the registries set tipc_bearer: eth0).
# This is genuine TIPC *between* containers, and it exercises the eth-bearer
# bringup the host-net model skips. It also runs cleanly on a shared host (e.g.
# dalek) with no port/etcd collisions, and the GUI gRPC ports are mapped explicitly.
#
#   central     a Theia rig (systemd) — services slice + etcd + mender-gw, inst 0
#   compute     a Theia rig (systemd) — ucm + shwa, inst 1
#   controller  drives colony ansible (docker-conn) + enroll-rig.sh + fleet.py
#   minio       the THEIA artifact S3 (theia-runtime/ + app plane)
#
# Boards run systemd as PID 1 → privileged + cgroup mount. NET_ADMIN lets the TIPC
# bearer enable on eth0. The Mender server (ground-station up.sh) is joined to this
# bridge as `docker.mender.io` by run-e2e.sh.

networks:
  ota:
    name: ota-e2e
    driver: bridge

services:
  minio:
    image: minio/minio:latest
    container_name: ota-minio
    networks: [ota]
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=theia
      - MINIO_ROOT_PASSWORD=theiaminio
    tmpfs: [ /data ]

  central:
    build:
      context: .
      dockerfile: Dockerfile.board
      args:
        # Board base MUST match the build host's distro (ABI). run-full-story.sh
        # sets BOARD_BASE from the host's os-release; default 22.04 for local dev.
        BASE: ${BOARD_BASE:-ubuntu:22.04}
    image: theia-ota-board:latest
    container_name: ota-central
    hostname: central
    privileged: true
    cgroup: host
    cap_add: [ NET_ADMIN ]               # tipc bearer enable on eth0
    tmpfs: [ /run, /run/lock ]
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    networks:
      ota: { aliases: [central] }
    ports:                               # com's GUI gRPC views (own netns → map them)
      - "7700:7700"                      # SupervisorView/PerView/NmView/DiagView/Provisioning
      - "7710:7710"                      # TraceStream
      - "7711:7711"                      # LogStream

  compute:
    image: theia-ota-board:latest        # same image; role differs only by manifest
    container_name: ota-compute
    hostname: compute
    privileged: true
    cgroup: host
    cap_add: [ NET_ADMIN ]
    tmpfs: [ /run, /run/lock ]
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    networks:
      ota: { aliases: [compute] }
    depends_on: [central]

  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    image: theia-ota-controller:latest
    container_name: ota-controller
    networks: [ota]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COLONY_DIR:-../..}:/repo/colony:rw
      - ${THEIA_DIR:-../../../theia}:/repo/theia:rw
      - ${GROUND_STATION_DIR:-../../../ground-station}:/repo/ground-station:rw
    working_dir: /repo
    depends_on: [central, compute]
    command: ["sleep", "infinity"]
