# docker-compose.yml — OTA end-to-end test (provision → enroll → install → update
# → rollback), CI-runnable, on HOST networking.
#
# Host networking (not a bridge) so host-side tdb / rtdb / the artheia probe can
# reach the stack's nodes over raw TIPC, and so the two boards share ONE host TIPC
# namespace (the supervisor disambiguates them by machine_instance 0/1 — central 0,
# compute 1 — exactly the deploy/docker-compose.yml model). etcd runs on central
# only (a second one would collide on :2379).
#
#   central     a Theia rig (systemd) — full services slice + demo apps + etcd, inst 0
#   compute     a Theia rig (systemd) — ucm + shwa, inst 1
#   controller  drives colony ansible + enroll-rig.sh + fleet.py
#
# Ansible reaches the boards via the `community.docker.docker` connection (docker
# exec), NOT ssh — on host networking two sshd's can't both bind :22, and exec
# needs no keys/ports. The controller mounts the docker socket for this.
#
# Boards run systemd as PID 1 → privileged + the cgroup mount. The Mender server is
# brought up separately by run-e2e.sh (ground-station up.sh) and is reachable on the
# host net at https://localhost / docker.mender.io.
#
# Driven by run-e2e.sh — the boards start EMPTY and wait for the controller.

services:
  # MinIO — the S3 store for the THEIA artifact planes (theia-runtime/ + the app
  # plane). Distinct from the Mender server's own seaweedfs (Mender-internal). On
  # host net it's reachable at http://127.0.0.1:9000, mirroring dalek's MinIO. The
  # boards pull the runtime+services from here (install-runtime-s3); `theia release`
  # + the app publisher push here.
  minio:
    image: minio/minio:latest
    container_name: ota-minio
    network_mode: host
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=theia
      - MINIO_ROOT_PASSWORD=theiaminio
    tmpfs: [ /data ]

  central:
    build:
      context: .
      dockerfile: Dockerfile.board
    image: theia-ota-board:latest
    container_name: ota-central
    hostname: central
    network_mode: host
    privileged: true
    cgroup: host
    tmpfs: [ /run, /run/lock ]
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  compute:
    image: theia-ota-board:latest        # same image; role differs only by manifest
    container_name: ota-compute
    hostname: compute
    network_mode: host
    privileged: true
    cgroup: host
    tmpfs: [ /run, /run/lock ]
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on: [central]

  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    image: theia-ota-controller:latest
    container_name: ota-controller
    network_mode: host
    volumes:
      # The docker socket — ansible reaches the boards via the docker connection
      # (docker exec into ota-central / ota-compute), and fleet.py/up.sh manage the
      # Mender server containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # The three repos the controller drives, bind-mounted read-write.
      - ${COLONY_DIR:-../..}:/repo/colony:rw
      - ${THEIA_DIR:-../../../theia}:/repo/theia:rw
      - ${GROUND_STATION_DIR:-../../../ground-station}:/repo/ground-station:rw
    working_dir: /repo
    depends_on: [central, compute]
    command: ["sleep", "infinity"]
