# OTA e2e test registry — central (the gateway/coordinator board container).
#
# BRIDGE network: own netns/TIPC namespace (the real rpi4 model). Reached via the
# docker connection (ansible exec). The runtime+services are pulled FROM S3 (MinIO
# at the `ota-minio` container, runtime_version pinned) — the install-runtime-s3
# path (Phase A). Cross-board reaches compute over a real TIPC eth bearer.
ansible_host: ota-central
ansible_connection: community.docker.docker
ansible_user: root
machine: central
arch: x86_64
deb_arch: amd64

# S3 runtime plane (MinIO on the bridge — reached by container DNS name).
runtime_version: e2e-local
s3_endpoint: http://ota-minio:9000
s3_runtime_bucket: theia-runtime

# central is the etcd singleton. On a bridge it has its OWN netns, so it runs its
# own etcd (no collision with the host/dalek etcd — unlike host networking). Bind
# all-interfaces; compute reaches it by the `central` bridge alias.
etcd_external: false
etcd_listen_host: 0.0.0.0
etcd_advertise_host: central

mender_role: gateway
boards: "central,compute"

# BRIDGE: central + compute are SEPARATE TIPC namespaces, so the cross-board link
# is a real TIPC eth bearer over the bridge L2 — enabled on BOTH ends (compute too)
# by tipc-bearer.yml. machine_instance still offsets node addresses per board.
tipc_scope: cluster
tipc_bearer: eth0
machine_instance: 0
