# OTA e2e test registry — central (the gateway/coordinator board container).
#
# Reached via the docker connection (ansible exec into the container) — no SSH on
# host networking. x86 (the DOCKER manifest attr), NO S3 (orchestrate installs from
# the LOCAL bundle dist/manifest/central/central.deb the controller built).
ansible_host: ota-central
ansible_connection: community.docker.docker
ansible_user: root
machine: central
arch: x86_64
deb_arch: amd64

# On HOST networking the runner's own etcd (127.0.0.1:2379) is visible to the
# container, and a second etcd would collide on :2379/:2380. So treat etcd as
# EXTERNALLY provided — colony's etcd.yml skips install/start and the FCs connect
# to the host's etcd (the deploy/docker-compose.yml model). The CI runner brings up
# an etcd before the test (run-e2e.sh starts one if absent).
etcd_external: true
etcd_advertise_host: 127.0.0.1

mender_role: gateway
boards: "central,compute"

# Host networking shares ONE TIPC namespace; the supervisor offsets each node's
# TIPC instance by machine_instance so central(0) and compute(1) don't collide.
# No eth bearer is needed (same namespace) — leave tipc_bearer unset.
tipc_scope: cluster
machine_instance: 0
