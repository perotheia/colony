# OTA e2e test registry — compute (the updatable domain board container).
# Reached via the docker connection (exec into ota-compute). Shares the host TIPC
# namespace with central; machine_instance 1 keeps its node addresses distinct.
ansible_host: ota-compute
ansible_connection: community.docker.docker
ansible_user: root
machine: compute
arch: x86_64
deb_arch: amd64

mender_role: agent
# central's etcd + services are on the same host net → localhost.
mender_proxy_host: 127.0.0.1
tipc_central_host: 127.0.0.1

tipc_scope: cluster
machine_instance: 1
